<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hospital System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="hero-card" style="max-width: 700px; margin: 0 auto;">
            <div>
                <h2>Welcome Back</h2>
                <p>Sign in to access the Hospital Management System modules for appointments, billing, and staff management.</p>
            </div>
            <div class="card" style="margin-top: 24px;">
                <form id="loginForm" class="form-grid">
                    <div class="form-group">
                        <label for="username">Username or email</label>
                        <input id="username" name="username" type="text" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" placeholder="Your password" required>
                    </div>
                    <button type="submit">Login</button>
                </form>
                <p class="page-meta" style="margin-top: 16px; text-align: center;">Don’t have an account? <a href="register.html" style="color: #c7d2ff;">Register now</a></p>
            </div>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e){
            e.preventDefault();
            showToast('Login successful — redirecting...');
            setTimeout(()=> window.location = 'dashboard.html', 900);
        });
        function showToast(message) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2200);
        }
    </script>
</body>
</html>
